databases:
  - name: novatask-db
    plan: free
    databaseName: novatask
    user: novatask

services:
  - type: web
    name: novatask-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: novatask-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MAIL_ENABLED
        value: "false"
